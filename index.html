<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Minecraft Sound Sampler</title>
</head>
<body>

    <header>
        <h1>Minecraft Block Sound Sampler</h1>
        <p>Click blocks to hear Minecraft sounds</p>
    </header>


    <section class="blck-cnt">
        <div class="block-card">
            <img src="Assets/images/stone.jpg" alt="Stone-Block">
            <button onmousedown="sound1.play()" class="btn">Stone</button>
        </div>

        <div class="block-card" >
            <img src="Assets/images/grass.jpg" alt="Grass-Block">
            <button onmousedown="sound2.play()" class="btn">Grass</button>
        </div>
        
        <div class="block-card">
            <img src="Assets/images/dirt.jpg" alt="Dirt-Block">
            <button onmousedown="sound2.play()" class="btn">Dirt</button>
         </div>

        <div class="block-card" >
            <img src="Assets/images/gold.jpg" alt="Gold-Block">
            <button onmousedown="sound1.play()" class="btn">Gold</button>
         </div>

        <div class="block-card" >
            <img src="Assets/images/diamond.jpg" alt="Diamond-Block">
            <button onmousedown="sound1.play()" class="btn">Diamond</button>
         </div>


        <div class="block-card" >
            <img src="Assets/images/wood.jpg" alt="wood-Block">
            <button onmousedown="sound1.play()" class="btn">Wood</button>
         </div>


        <div class="block-card" >
            <img src="Assets/images/sand.jpg" alt="lava-Block">
            <button onmousedown="sound3.play()" class="btn">Sand</button>
         </div>

        <div class="block-card" >
            <img src="Assets/images/lava.jpg" alt="lava-Block">
            <button onmousedown="sound4.play()" class="btn">Lava</button>
         </div>

    </section>

    


    <script src="script.js"></script>



</body>
</html>
